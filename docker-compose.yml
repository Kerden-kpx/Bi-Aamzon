services:
  redis:
    image: redis:7-alpine
    container_name: bi-amazon-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bi-amazon-backend
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STRATEGY_ATTACHMENT_ROOT: /app/uploads/strategy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/files:/app/files
      - ./backend/uploads:/app/uploads
    expose:
      - "18765"
    ports:
      - "18765:18765"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18765/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bi-amazon-worker
    restart: unless-stopped
    depends_on:
      - redis
      - backend
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STRATEGY_ATTACHMENT_ROOT: /app/uploads/strategy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/files:/app/files
      - ./backend/uploads:/app/uploads
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: bi-amazon-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "6184:6184"

volumes:
  redis-data:
